name: Java CI with Maven

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
    
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  
permissions:
  contents: read    # Allowed to read the source code
  packages: write  # CRITICAL: Allowed to upload Docker images to GHCR

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      # This is how we handle INTEGRATION TESTS
      # We spin up a temporary Postgres database in the cloud!
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: cicd-task-db
          POSTGRES_USER: user
          POSTGRES_PASSWORD: pooja
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven
        
    - name: Build and Test with Maven
      run: mvn -B package --file pom.xml
     
    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }} # GitHub generates this temporary key automatically

    - name: Build and Push Docker Image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ghcr.io/khyatid-kaiinos/task-manager-backend:latest
