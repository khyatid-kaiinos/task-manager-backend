apiVersion: apps/v1
kind: Deployment
metadata:
  name: task-manager-backend
  labels:
    app: task-manager-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: task-manager-backend
  template:
    metadata:
      labels:
        app: task-manager-backend
    spec:
      imagePullSecrets:
      - name: ghcr-secret # Uses the GitHub key secret you created earlier
      containers:
      - name: backend-app
        image: ghcr.io/khyatid-kaiinos/task-manager-backend:latest
        ports:
        - containerPort: 8080
        imagePullPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  name: task-manager-backend-service
spec:
  type: NodePort
  selector:
    app: task-manager-backend
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30080 # Maps the container to port 30080 on your host machine